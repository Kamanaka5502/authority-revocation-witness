<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Authority Revocation Witness — High-Dimensional Proof Surface</title>
  <desc id="desc">A visual front page showing prior authority, revocation boundary, consequence attempt, and refusal or revalidation.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6D27A"/>
      <stop offset="55%" stop-color="#B98A2E"/>
      <stop offset="100%" stop-color="#6D4A13"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F6D27A" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="1400" height="720" fill="#050608"/>
  <rect width="1400" height="720" fill="url(#grid)"/>
  <circle cx="700" cy="360" r="315" fill="url(#glow)"/>

  <text x="700" y="74" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="45" font-weight="700" fill="#F8FAFC" letter-spacing="1.8">AUTHORITY REVOCATION WITNESS</text>
  <text x="700" y="116" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" fill="#D6B86A">Previously valid authority is not continuing authority.</text>

  <line x1="175" y1="360" x2="1225" y2="360" stroke="#CBD5E1" stroke-opacity="0.28" stroke-width="2"/>
  <line x1="175" y1="360" x2="650" y2="360" stroke="url(#violet)" stroke-width="5" filter="url(#softGlow)"/>
  <line x1="750" y1="360" x2="1225" y2="360" stroke="#EF4444" stroke-opacity="0.78" stroke-width="5" stroke-dasharray="12 12"/>

  <rect x="150" y="244" width="270" height="150" rx="18" fill="#120A22" stroke="#C4B5FD" stroke-opacity="0.58"/>
  <text x="285" y="292" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#EDE9FE">PRIOR AUTHORITY</text>
  <text x="285" y="326" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#DDD6FE">actor · authority · standing</text>
  <text x="285" y="352" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#DDD6FE">valid before revocation</text>

  <rect x="565" y="200" width="270" height="260" rx="22" fill="#100C04" stroke="url(#gold)" stroke-width="3" filter="url(#softGlow)"/>
  <line x1="700" y1="178" x2="700" y2="500" stroke="url(#gold)" stroke-width="4" stroke-dasharray="8 9"/>
  <text x="700" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#FDE68A">REVOCATION</text>
  <text x="700" y="288" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#FDE68A">BOUNDARY</text>
  <text x="700" y="334" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#F8FAFC">authority basis removed</text>
  <text x="700" y="360" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#F8FAFC">continuation must revalidate</text>
  <text x="700" y="410" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FCA5A5">NO SILENT AUTHORITY CARRYOVER</text>

  <rect x="980" y="244" width="270" height="150" rx="18" fill="#1A0B0B" stroke="#EF4444" stroke-opacity="0.7"/>
  <text x="1115" y="292" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#FECACA">CONSEQUENCE</text>
  <text x="1115" y="322" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#FECACA">ATTEMPT</text>
  <text x="1115" y="354" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#FCA5A5">protected bind requested</text>

  <path d="M420 360 C480 330, 520 330, 565 330" fill="none" stroke="#C4B5FD" stroke-width="3" stroke-opacity="0.8"/>
  <path d="M835 330 C895 330, 920 340, 980 360" fill="none" stroke="#EF4444" stroke-width="3" stroke-opacity="0.8" marker-end="url(#arrow)"/>

  <rect x="155" y="520" width="260" height="84" rx="14" fill="#120A22" stroke="#C4B5FD" stroke-opacity="0.35"/>
  <text x="285" y="553" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#EDE9FE">AUTHORITY VALID</text>
  <text x="285" y="582" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#DDD6FE">AUTHORITY_VALID</text>

  <rect x="570" y="520" width="260" height="84" rx="14" fill="#151006" stroke="#F6D27A" stroke-opacity="0.55"/>
  <text x="700" y="553" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#FDE68A">REVOKED BASIS</text>
  <text x="700" y="582" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#FCD34D">REVALIDATION_REQUIRED</text>

  <rect x="985" y="520" width="260" height="84" rx="14" fill="#1A0B0B" stroke="#EF4444" stroke-opacity="0.55"/>
  <text x="1115" y="553" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#FECACA">PROTECTED BIND</text>
  <text x="1115" y="582" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#FCA5A5">REVOKED_AUTHORITY_REFUSED</text>

  <text x="700" y="662" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#CBD5E1">A proof artifact for stale authority at the continuation boundary.</text>
</svg>
